<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">

  <!-- FAVICON & PWA CONFIGURATION              -->
  <!-- ======================================== -->

  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  
  <!-- Android Chrome Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/android-chrome-512x512.png">
  
  <!-- Web App Manifest - CRITICAL for Install Button -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Theme Colors -->

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HydroFit">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="HydroFit">
  <meta name="msapplication-TileColor" content="#00b4d8">
  <meta name="msapplication-TileImage" content="assets/android-chrome-144x144.png">
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Academic Fitness Tracker for PathFit Class - Mindoro State University">
  <meta name="keywords" content="fitness, academic, pathfit, mindoro, university, tracker, hydrofit">
  <meta name="author" content="HydroFit Team">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="HydroFit | Academic Fitness Tracker">
  <meta property="og:description" content="Your Academic Fitness Tracker for PathFit Class">
  <meta property="og:image" content="assets/android-chrome-512x512.png">
  <meta property="og:url" content="https://hydrofit.app">
  <meta property="og:type" content="website">

<body>
<div class="app-container">
  <!-- ======================================== -->
  <!-- SIDEBAR NAVIGATION                       -->
  <!-- ======================================== -->

    <div class="logo-area">
      <img src="https://ik.imagekit.io/0sf7uub8b/HydroFit/N%20(2).png" alt="HydroFit Logo">
      <span>Hydro<span class="light">Fit</span></span>
    </div>
    <nav class="nav-menu">
      <button class="nav-btn active" data-tab="dashboard">
        <i class="fas fa-chalkboard-user"></i> Dashboard
      </button>
      <button class="nav-btn" data-tab="profile">
        <i class="fas fa-user-circle"></i> My Profile
      </button>
      <button class="nav-btn" data-tab="assignment">
        <i class="fas fa-clipboard-list"></i> Fitness Assessment
      </button>
      <button class="nav-btn" data-tab="timer">
        <i class="fas fa-clock"></i> Exercise Timer
      </button>
      <button class="nav-btn" data-tab="heartrate">
        <i class="fas fa-heart-pulse"></i> Heart Rate
      </button>
      <button class="nav-btn" data-tab="bmi">
        <i class="fas fa-weight-scale"></i> BMI Tracker
      </button>
      <button class="nav-btn" data-tab="movement">
        <i class="fas fa-video"></i> Movement Demo
      </button>
      <button class="nav-btn" data-tab="bodyparts">
        <i class="fas fa-person-walking"></i> Body Parts
      </button>
      <button class="nav-btn" data-tab="bodytype">
        <i class="fas fa-user-tag"></i> Body Type
      </button>
      <button class="nav-btn" data-tab="injury">
        <i class="fas fa-shield"></i> Injury Prevention
      </button>
      <button class="nav-btn" data-tab="recovery">
        <i class="fas fa-bed"></i> Recovery
      </button>
      <button class="nav-btn" data-tab="ranking">
        <i class="fas fa-trophy"></i> Ranking
      </button>
      <button class="nav-btn" data-tab="download">
        <i class="fas fa-download"></i> Download
      </button>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
  </aside>

  <!-- ======================================== -->
  <!-- MAIN PANEL                               -->
  <!-- ======================================== -->
  <main class="main-panel">
    <div class="top-bar">
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
      </button>
      <h2 id="pageTitle">Dashboard</h2>
      <div class="user-stats">
        <span id="userNameDisplay"><i class="fas fa-user"></i> Student</span>
      </div>
    </div>

    <div class="tab-content" id="tabContent">
      <div class="loading-placeholder">
        <i class="fas fa-spinner fa-spin"></i> Loading...
      </div>
    </div>
  </main>
</div>

<!-- ======================================== -->
<!-- LOGIN/REGISTER MODAL                     -->
<!-- ======================================== -->
<div id="authModal" class="modal" style="display: flex;">
  <div class="modal-content">
    <div class="modal-header">
      <img src="https://ik.imagekit.io/0sf7uub8b/HydroFit/N%20(2).png" alt="HydroFit Logo">
      <h2>HydroFit</h2>
      <p>Academic Fitness Tracker</p>
    </div>
    <div class="modal-body" id="authFormContainer">
      <!-- Login Form -->
      <div id="loginForm">
        <input type="text" id="loginSchoolId" class="modal-input" placeholder="School ID (e.g., MCC2025-00001)" autocomplete="off">
        <input type="password" id="loginPassword" class="modal-input" placeholder="Password">
        <button class="modal-btn" id="loginBtn">Login</button>
        <div class="modal-link">No account? <span id="showRegister">Register here</span></div>
      </div>
      <!-- Register Form -->
      <div id="registerForm" style="display: none;">
        <input type="text" id="regFullName" class="modal-input" placeholder="Full name (e.g., Dela Cruz, Juan M.)">
        <input type="text" id="regSchoolId" class="modal-input" placeholder="School ID (e.g., MCC2025-00001)">
        <input type="email" id="regEmail" class="modal-input" placeholder="Email address">
        <select id="regProgram" class="modal-input">
          <option value="">Select Program</option>
          <option value="BSIT">BSIT</option>
          <option value="BSED">BSED</option>
          <option value="BSHM">BSHM</option>
          <option value="BSTM">BSTM</option>
          <option value="BS PSYCHOLOGY">BS PSYCHOLOGY</option>
          <option value="BSCRIM">BSCRIM</option>
          <option value="BTLED">BTLED</option>
          <option value="BTVTED">BTVTED</option>
        </select>
        <select id="regYearLevel" class="modal-input">
          <option value="">Select Year Level</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
        <input type="text" id="regSection" class="modal-input" placeholder="Section (e.g., F1)">
        <input type="password" id="regPassword" class="modal-input" placeholder="Password">
        <input type="password" id="regConfirmPassword" class="modal-input" placeholder="Confirm Password">
        <button class="modal-btn" id="registerBtn">Register</button>
        <div class="modal-link">Already have an account? <span id="showLogin">Login here</span></div>
      </div>
    </div>
  </div>
</div>

<script src="js/install-prompt.js"></script>

<!-- ======================================== -->
<!-- PWA SERVICE WORKER - ENABLES INSTALL      -->
<!-- ======================================== -->
<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(registration => {
          // Silent registration - no console log in production
          registration.addEventListener('updatefound', () => {
            // Service Worker update found
          });
        })
        .catch(error => {
          // Silent fail
        });
    });
  }
  
  // Capture install prompt for custom UI
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    window.deferredPrompt = deferredPrompt;
  });
  
  // Track successful installation
  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    window.deferredPrompt = null;
  });
</script>

</body>
</html>
