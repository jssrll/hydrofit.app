  <!-- MAXIMUM SECURITY - LOADS FIRST           -->
  <!-- ======================================== -->
  <script>
    (function() {
      "use strict";
      
      // 1. Disable right-click (capture phase - catches it first)
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }, true);
      
      // 2. Block all devtools shortcuts
      document.addEventListener('keydown', function(e) {
        const key = e.key || e.keyCode;
        // F12
        if (key === 'F12' || key === 123) { e.preventDefault(); return false; }
        // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && (key === 'I' || key === 73)) { e.preventDefault(); return false; }
        // Ctrl+Shift+J
        if (e.ctrlKey && e.shiftKey && (key === 'J' || key === 74)) { e.preventDefault(); return false; }
        // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && (key === 'C' || key === 67)) { e.preventDefault(); return false; }
        // Ctrl+U
        if (e.ctrlKey && (key === 'U' || key === 85)) { e.preventDefault(); return false; }
        // Ctrl+S
        if (e.ctrlKey && (key === 'S' || key === 83)) { e.preventDefault(); return false; }
        // Ctrl+P
        if (e.ctrlKey && (key === 'P' || key === 80)) { e.preventDefault(); return false; }
      }, true);
      
      // 3. DevTools detection with redirect
      let devtoolsDetected = false;
      const checkDevTools = setInterval(function() {
        const widthThreshold = window.outerWidth - window.innerWidth > 160;
        const heightThreshold = window.outerHeight - window.innerHeight > 160;
        
        if ((widthThreshold || heightThreshold) && !devtoolsDetected) {
          devtoolsDetected = true;
          document.body.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;text-align:center">
              <div>
                <h1 style="color:#d63031;font-size:2rem;margin-bottom:16px">⚠️ Developer Tools Detected</h1>
                <p style="font-size:1.1rem;margin-bottom:24px;opacity:0.9">Please close developer tools to continue using HydroFit.</p>
                <button onclick="location.reload()" style="padding:12px 32px;background:#00b4d8;border:none;border-radius:40px;color:white;font-weight:600;font-size:1rem;cursor:pointer">Refresh Page</button>
              </div>
            </div>
          `;
          clearInterval(checkDevTools);
        }
      }, 300);
      
      // 4. Disable console functions
      const noop = function(){};
      Object.defineProperty(window, 'console', {
        get: function() {
          return {
            log: noop, warn: noop, error: noop, info: noop, 
            clear: noop, table: noop, trace: noop, debug: noop
          };
        }
      });
      
      // 5. Prevent view source
      document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'U') {
          e.preventDefault();
          return false;
        }
      });
    })();
  </script>

<!-- PWA SERVICE WORKER - ENABLES INSTALL      -->
<!-- ======================================== -->
<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(registration => {
          console.log('✅ ServiceWorker registered with scope:', registration.scope);
          
          // Check for updates
          registration.addEventListener('updatefound', () => {
            console.log('🔄 Service Worker update found!');
          });
        })
        .catch(error => {
          console.log('❌ ServiceWorker registration failed:', error);
        });
    });
  }
  
  // Check if app is already installed
  if (window.matchMedia('(display-mode: standalone)').matches || 
      window.navigator.standalone === true) {
    console.log('📱 HydroFit is running as installed PWA');
  }
  
  // Capture install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    window.deferredPrompt = deferredPrompt;
    console.log('📲 Install prompt captured! Ready to install.');
  });
  
  // Track when app is successfully installed
  window.addEventListener('appinstalled', () => {
    console.log('✅ HydroFit was successfully installed!');
    deferredPrompt = null;
    window.deferredPrompt = null;
  });
</script>

<!-- Security Script - Fixed Version -->
<script>
  // Disable right-click context menu (but allow on inputs/forms)
  document.addEventListener('contextmenu', function(e) {
    // Allow right-click on input fields and textareas
    if (e.target.tagName === 'INPUT' || 
        e.target.tagName === 'TEXTAREA' || 
        e.target.tagName === 'SELECT') {
      return true;
    }
    e.preventDefault();
    return false;
  });
  
  // Disable specific keyboard shortcuts (but not all)
  document.addEventListener('keydown', function(e) {
    // Only block if Ctrl/Shift/Cmd is pressed
    if (!e.ctrlKey && !e.shiftKey && !e.metaKey) return true;
    
    // Disable F12
    if (e.key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      return false;
    }
    
    // Disable Ctrl+Shift+I (DevTools)
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {
      e.preventDefault();
      return false;
    }
    
    // Disable Ctrl+Shift+J (Console)
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) {
      e.preventDefault();
      return false;
    }
    
    // Disable Ctrl+Shift+C (Element Inspector)
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c' || e.keyCode === 67)) {
      e.preventDefault();
      return false;
    }
    
    // Disable Ctrl+U (View Source)
    if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
      e.preventDefault();
      return false;
    }
    
    // Allow all other key combinations (important for accessibility)
    return true;
  });
  
  console.log('%c💧 HydroFit', 'color: #00b4d8; font-size: 20px; font-weight: bold;');
  console.log('%cAcademic Fitness Tracker', 'color: #023e8a; font-size: 14px;');
</script>
