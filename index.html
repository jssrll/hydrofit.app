<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>HYDROFIT | Gamified Fitness Suite</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- SIDEBAR NAVIGATION -->
    <aside class="sidebar">
      <div class="logo-area">
        <i class="fas fa-water"></i>
        <span>HYDRO<span class="light">FIT</span></span>
      </div>
      <nav class="nav-menu">
        <button class="nav-btn active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</button>
        <button class="nav-btn" data-tab="profile"><i class="fas fa-user-circle"></i> My Profile</button>
        <button class="nav-btn" data-tab="gamified"><i class="fas fa-gamepad"></i> Gamified Hub</button>
        <button class="nav-btn" data-tab="assessment"><i class="fas fa-clipboard-list"></i> Fitness Assessment</button>
        <button class="nav-btn" data-tab="movement"><i class="fas fa-play-circle"></i> Movement Library</button>
        <button class="nav-btn" data-tab="ai-assist"><i class="fas fa-robot"></i> AI Exercise Guide</button>
        <button class="nav-btn" data-tab="tracker"><i class="fas fa-chart-line"></i> Competency Tracker</button>
        <button class="nav-btn" data-tab="scheduler"><i class="fas fa-calendar-check"></i> Workout Scheduler</button>
        <button class="nav-btn" data-tab="timer"><i class="fas fa-hourglass-half"></i> Exercise Timer</button>
        <button class="nav-btn" data-tab="warmup"><i class="fas fa-sun"></i> Warmup Gen</button>
        <button class="nav-btn" data-tab="injury"><i class="fas fa-shield-alt"></i> Injury Guide</button>
        <button class="nav-btn" data-tab="attendance"><i class="fas fa-user-check"></i> Class Tracker</button>
        <button class="nav-btn" data-tab="habit"><i class="fas fa-fire"></i> Habit Builder</button>
        <button class="nav-btn" data-tab="goals"><i class="fas fa-bullseye"></i> Goal Planner</button>
        <button class="nav-btn" data-tab="bodyparts"><i class="fas fa-muscle"></i> Body Focus</button>
        <button class="nav-btn" data-tab="calorie"><i class="fas fa-apple-alt"></i> Calorie Tracker</button>
        <button class="nav-btn" data-tab="bmi"><i class="fas fa-weight-scale"></i> BMI Tracker</button>
        <button class="nav-btn" data-tab="recovery"><i class="fas fa-bed"></i> Recovery Rest</button>
        <button class="nav-btn" data-tab="heartrate"><i class="fas fa-heartbeat"></i> Heart Logger</button>
        <button class="nav-btn" data-tab="bodytype"><i class="fas fa-user-tag"></i> Body Type</button>
      </nav>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </aside>

    <!-- MAIN CONTENT PANEL -->
    <main class="main-panel">
      <header class="top-bar">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <h2 id="active-title">HYDROFIT Dashboard</h2>
        <div class="user-stats">
          <span><i class="fas fa-star"></i> <span id="pointsDisplay">0</span> pts</span>
          <span><i class="fas fa-trophy"></i> Lv.<span id="levelDisplay">1</span></span>
        </div>
      </header>
      <div id="tab-content" class="tab-content">
        <div class="loading-placeholder">Loading...</div>
      </div>
    </main>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="modal" style="display: flex;">
    <div class="modal-content">
      <div class="modal-header">
        <i class="fas fa-water"></i>
        <h2>HYDROFIT</h2>
        <p>Login to continue</p>
      </div>
      <div class="modal-body">
        <input type="text" id="loginSchoolId" placeholder="School ID" class="modal-input">
        <input type="password" id="loginPassword" placeholder="Password" class="modal-input">
        <button id="loginBtn" class="modal-btn">Login</button>
        <p class="modal-link">Don't have an account? <span id="showRegister">Register here</span></p>
      </div>
    </div>
  </div>

  <!-- Register Modal -->
  <div id="registerModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <i class="fas fa-water"></i>
        <h2>Create Account</h2>
      </div>
      <div class="modal-body">
        <input type="text" id="regFullName" placeholder="Full Name (Last, First Middle)" class="modal-input">
        <input type="text" id="regSchoolId" placeholder="School ID" class="modal-input">
        <input type="text" id="regSubject" placeholder="Subject (e.g., Pathfit)" class="modal-input">
        <select id="regProgram" class="modal-input">
          <option value="">Select Program</option>
          <option>BSIT</option>
          <option>BSCRIM</option>
          <option>BSHM</option>
          <option>BSTM</option>
          <option>BSED</option>
          <option>BS Psychology</option>
          <option>BS English</option>
          <option>BTLED</option>
        </select>
        <input type="password" id="regPassword" placeholder="Password" class="modal-input">
        <input type="password" id="regConfirmPassword" placeholder="Confirm Password" class="modal-input">
        <button id="registerBtn" class="modal-btn">Register</button>
        <p class="modal-link">Already have an account? <span id="showLogin">Login here</span></p>
      </div>
    </div>
  </div>

  <!-- Profile Modal for QR Code -->
  <div id="profileModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <i class="fas fa-qrcode"></i>
        <h2>Your QR Code</h2>
      </div>
      <div class="modal-body text-center">
        <div id="qrCodeContainer"></div>
        <p id="qrUserInfo"></p>
        <button class="modal-btn" id="closeProfileModal">Close</button>
      </div>
    </div>
  </div>

  <audio id="alertSound" preload="auto" style="display:none;">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
  </audio>

  <script src="config.js"></script>
  <script src="sheets-integration.js"></script>
  <script src="chatbase-ai.js"></script>
  <script src="app.js"></script>
</body>
</html>
