<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HydroFit | Academic Fitness Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-area">
      <i class="fas fa-tint"></i>
      <span>Hydro<span class="light">Fit</span></span>
    </div>
    <nav class="nav-menu">
      <button class="nav-btn active" data-tab="dashboard">
        <i class="fas fa-chalkboard-user"></i> Dashboard
      </button>
      <button class="nav-btn" data-tab="profile">
        <i class="fas fa-user-circle"></i> My Profile
      </button>
      <button class="nav-btn" data-tab="assignment">
        <i class="fas fa-pen-ruler"></i> Assignment
      </button>
      <button class="nav-btn" data-tab="ranking">
        <i class="fas fa-trophy"></i> Ranking
      </button>
    </nav>
    <button class="logout-btn" id="logoutBtn">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </aside>

  <!-- MAIN PANEL -->
  <main class="main-panel">
    <div class="top-bar">
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
      </button>
      <h2 id="pageTitle">Dashboard</h2>
      <div class="user-stats">
        <span id="userNameDisplay">Student</span>
        <span><i class="fas fa-tint"></i> <span id="hydrationPoints">0</span> HP</span>
      </div>
    </div>

    <div class="tab-content" id="tabContent">
      <!-- Dynamic content will be loaded here -->
      <div class="loading-placeholder">
        <i class="fas fa-spinner fa-spin"></i> Loading...
      </div>
    </div>
  </main>
</div>

<!-- LOGIN / REGISTER MODAL -->
<div id="authModal" class="modal" style="display: flex;">
  <div class="modal-content">
    <div class="modal-header">
      <i class="fas fa-tint"></i>
      <h2>HydroFit</h2>
      <p>Academic Fitness Tracker</p>
    </div>
    <div class="modal-body" id="authFormContainer">
      <!-- Login Form -->
      <div id="loginForm">
        <input type="text" id="loginPhone" class="modal-input" placeholder="Phone Number" autocomplete="off">
        <input type="password" id="loginPassword" class="modal-input" placeholder="Password">
        <button class="modal-btn" id="loginBtn">Login</button>
        <div class="modal-link">No account? <span id="showRegister">Register here</span></div>
      </div>
      <!-- Register Form (hidden initially) -->
      <div id="registerForm" style="display: none;">
        <input type="text" id="regFullName" class="modal-input" placeholder="Full Name">
        <input type="text" id="regPhone" class="modal-input" placeholder="Phone Number">
        <input type="password" id="regPassword" class="modal-input" placeholder="Password">
        <input type="text" id="regStudentId" class="modal-input" placeholder="Student ID">
        <button class="modal-btn" id="registerBtn">Register</button>
        <div class="modal-link">Already have an account? <span id="showLogin">Login here</span></div>
      </div>
    </div>
  </div>
</div>

<!-- QR SCANNER MODAL -->
<div id="qrModal" class="modal" style="display: none;">
  <div class="modal-content" style="max-width: 500px;">
    <div class="modal-header">
      <i class="fas fa-qrcode"></i>
      <h2>QR Attendance</h2>
      <p>Scan class QR code to mark attendance</p>
    </div>
    <div class="modal-body">
      <div id="qr-reader" style="width: 100%;"></div>
      <div id="qr-result"></div>
      <button class="modal-btn" id="closeQrModal">Close</button>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast" style="position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: none;"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
